<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ivy's Cozy Closet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Fredoka',system-ui,sans-serif;background:#e7e0f7;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:22px;color:#3a2f55}
.app{display:flex;gap:20px;width:100%;max-width:1180px;height:min(660px,90vh)}
/* ---------- LEFT STAGE ---------- */
.stage{flex:0 0 43%;position:relative;border-radius:28px;background:linear-gradient(170deg,#f0eafb 0%,#e4d9f6 100%);box-shadow:0 8px 30px rgba(75,84,221,.12),inset 0 0 0 1px rgba(255,255,255,.6);padding:18px;display:flex;flex-direction:column;overflow:hidden}
.diag{position:absolute;inset:0;background-image:repeating-linear-gradient(135deg,rgba(255,255,255,.25) 0 2px,transparent 2px 22px);pointer-events:none;opacity:.5}
.topbar{position:relative;display:flex;justify-content:space-between;align-items:flex-start;z-index:2}
.logo{display:flex;align-items:center;gap:9px;background:#fff;padding:10px 18px;border-radius:16px;box-shadow:0 3px 10px rgba(90,75,158,.16);font-weight:600;font-size:19px;color:#5b4b9e}
.logo .mark{width:22px;height:22px;border-radius:50%;background:radial-gradient(circle at 50% 45%,#b29bea,#8570d2);position:relative;flex:none}
.logo .mark::after{content:"";position:absolute;inset:7px;border-radius:50%;background:#fff}
.hud{display:flex;gap:9px;align-items:center}
.stars{display:flex;align-items:center;gap:6px;background:#fff;padding:8px 14px;border-radius:14px;box-shadow:0 3px 10px rgba(90,75,158,.16);font-weight:600;font-size:16px;color:#7a5a00;border:1.5px solid #ffe08a}
.stars .st{color:#ffb900;font-size:17px}
.icon{width:40px;height:40px;border-radius:50%;border:none;background:#fff;box-shadow:0 3px 10px rgba(90,75,158,.16);cursor:pointer;font-size:17px;color:#8570d2;display:flex;align-items:center;justify-content:center}
.icon:hover{background:#f6f2ff}
.icon svg{width:20px;height:20px;display:block}
.icon.muted{color:#b7a9d6}
.modelWrap{position:relative;flex:1;min-height:0;display:flex;align-items:center;justify-content:center;z-index:1}
.ground{position:absolute;left:50%;bottom:8%;transform:translateX(-50%);width:46%;height:26px;background:radial-gradient(ellipse at center,rgba(70,50,110,.18),transparent 70%);filter:blur(3px)}
#model{position:relative;height:100%;width:100%;object-fit:contain;transition:opacity .16s ease;filter:drop-shadow(0 6px 10px rgba(80,55,120,.12))}
.actions{position:relative;display:flex;gap:10px;justify-content:center;z-index:2;margin-bottom:12px;flex-wrap:nowrap}
.btn{font-family:inherit;font-weight:600;font-size:14px;border:none;border-radius:16px;padding:12px 16px;cursor:pointer;min-height:46px;box-shadow:0 4px 0 rgba(0,0,0,.10);transition:transform .08s,box-shadow .08s}
.btn:active{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,.10)}
.finish{background:#4b54dd;color:#fff}
.photo{background:#e60076;color:#fff}
.reset{background:#ffb900;color:#5b3a00}
.looks{position:relative;z-index:2;display:flex;align-items:center;gap:12px;background:rgba(255,255,255,.6);border-radius:16px;padding:10px 14px}
.looksLbl{font-weight:600;font-size:14px;color:#5b4b9e;flex:none}
.looksTray{display:flex;gap:8px;flex-wrap:wrap;min-height:46px;align-items:center}
.looksTray .slot{width:38px;height:46px;border-radius:10px;background:#fff;border:1.5px solid #e6d8f2;overflow:hidden;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:transform .1s,border-color .1s}
.looksTray .slot:hover{transform:translateY(-2px);border-color:#4b54dd;box-shadow:0 0 0 1.5px #4b54dd}
.looksTray .slot img{width:100%;height:100%;object-fit:contain}
.hint{font-size:12px;color:#5b4b9e;font-weight:500}
/* ---------- RIGHT PANEL ---------- */
.panel{flex:1;border-radius:28px;background:#fdeef5;box-shadow:0 8px 30px rgba(230,0,118,.08),inset 0 0 0 1px rgba(255,255,255,.6);padding:24px 26px;overflow-y:auto}
.sectlbl{font-size:12px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:#a3004c;margin-bottom:12px}
.hairRow{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px}
.hair{width:52px;height:52px;border-radius:16px;cursor:pointer;border:3px solid #fff;box-shadow:0 2px 8px rgba(160,0,76,.12);transition:transform .1s}
.hair:hover{transform:scale(1.06)}
.hair.sel{border-color:#4b54dd;box-shadow:0 0 0 2px #4b54dd}
.rule{border:none;border-top:1.5px solid #f6d3e4;margin:4px 0 18px}
.outfitsHead{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px}
.setTitle{font-size:20px;font-weight:600;color:#5b1030}
.count{font-size:13px;font-weight:500;color:#a3004c}
.setBlock{margin-bottom:18px}
.setHead{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:9px}
.setName{font-size:13px;font-weight:600;color:#8a2a5a;display:flex;align-items:center;gap:8px;flex:none}
.setErr{font-size:13px;font-weight:600;color:#e5372c;text-align:right;opacity:0;transition:opacity .16s ease}
.setBlock.err .setErr{opacity:1}
.setName::before{content:"";width:12px;height:12px;border-radius:50%;flex:none}
.setBlock.yellow .setName::before{background:#ffcf5a}
.setBlock.pink .setName::before{background:#f6a5c8}
.setBlock.rainbow .setName::before{background:linear-gradient(90deg,#c6b4f0,#a4f4cf,#ffe08a,#f6a5c8)}
.tiles{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.tile{background:#fff;border:2px solid #f5dbe8;border-radius:18px;padding:12px 10px 10px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:6px;transition:transform .1s,border-color .1s,box-shadow .1s}
.tile:hover{transform:translateY(-2px);box-shadow:0 6px 16px rgba(230,0,118,.12)}
.tile.sel{border-color:#4b54dd;box-shadow:0 0 0 2px #4b54dd}
.tile img{width:100%;height:104px;object-fit:contain}
.tile span{font-size:13px;font-weight:600;color:#5b3a4a}
.resetRow{margin-top:6px}
.chip{font-family:inherit;font-size:13px;font-weight:600;color:#5b4b9e;background:#fff;border:2px solid #e6d8f2;border-radius:14px;padding:9px 16px;cursor:pointer}
.chip:hover{border-color:#c6b4f0}
.sparkleLayer{position:absolute;inset:0;pointer-events:none;z-index:5}
.spark{position:absolute;width:var(--sz,16px);height:var(--sz,16px);transform:translate(-50%,-50%) scale(0);opacity:0;animation:twinkle .52s ease-out forwards;filter:drop-shadow(0 0 5px rgba(255,255,255,.95)) drop-shadow(0 0 10px rgba(182,155,234,.6))}
.spark svg{width:100%;height:100%;display:block}
@keyframes twinkle{0%{transform:translate(-50%,-50%) scale(0) rotate(-25deg);opacity:0}35%{opacity:1}55%{transform:translate(-50%,-50%) scale(1.15) rotate(8deg);opacity:1}100%{transform:translate(-50%,-50%) scale(0) rotate(35deg);opacity:0}}
</style>
</head>
<body>
<div class="app">
  <!-- LEFT STAGE -->
  <section class="stage">
    <div class="diag"></div>
    <div class="topbar">
      <div class="logo"><span class="mark"></span> Cozy Closet</div>
      <div class="hud">
        <div class="stars"><span class="st">&#9733;</span><span id="starCount">30</span></div>
        <button class="icon" id="music" title="Music on — tap to mute" aria-label="Music on — tap to mute"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9h3l4.5-3.5v13L7 15H4z" fill="currentColor"/><path d="M15.5 9a4 4 0 0 1 0 6"/><path d="M18 6.5a8 8 0 0 1 0 11"/></svg></button>
      </div>
    </div>
    <div class="modelWrap">
      <div class="ground"></div>
      <img id="model" src="assets/cozy/model.png" alt="Your character">
    </div>
    <div class="actions">
      <button class="btn finish" id="finish">Finish the Look</button>
      <button class="btn photo" id="photo">Photo</button>
      <button class="btn reset" id="reset">Start Over</button>
    </div>
    <div class="looks">
      <span class="looksLbl">My Looks</span>
      <div class="looksTray" id="tray"></div>
      <span class="hint">tap Photo to save (max 5)</span>
    </div>
  </section>

  <!-- RIGHT PANEL -->
  <section class="panel">
    <div class="sectlbl">Hairstyles</div>
    <div class="hairRow" id="hairRow">
      <div class="hair sel" style="background:#8e583c" title="Auburn"></div>
      <div class="hair" style="background:#5b3a29" title="Brunette"></div>
      <div class="hair" style="background:#262626" title="Black"></div>
      <div class="hair" style="background:#e6bc87" title="Blonde"></div>
      <div class="hair" style="background:#fb64b6" title="Pink"></div>
      <div class="hair" style="background:#b29bea" title="Lilac"></div>
    </div>
    <hr class="rule">
    <div class="outfitsHead"><span class="setTitle">Outfits</span><span class="count">3 sets &middot; 6 pieces</span></div>

    <div class="setBlock yellow">
      <div class="setHead"><span class="setName">Sunny Yellow</span><span class="setErr">You need to select the top first</span></div>
      <div class="tiles">
        <div class="tile" data-g="ytop"><img src="assets/cozy/tiles/yellow-top.png" alt=""><span>Halter Top</span></div>
        <div class="tile" data-g="ybot"><img src="assets/cozy/tiles/yellow-bottom.png" alt=""><span>Wide Jeans</span></div>
      </div>
    </div>
    <div class="setBlock pink">
      <div class="setHead"><span class="setName">Pink Blossom</span><span class="setErr">You need to select the top first</span></div>
      <div class="tiles">
        <div class="tile" data-g="ptop"><img src="assets/cozy/tiles/pink-top.png" alt=""><span>Pink Tube Top</span></div>
        <div class="tile" data-g="pbot"><img src="assets/cozy/tiles/pink-bottom.png" alt=""><span>Floral Skirt</span></div>
      </div>
    </div>
    <div class="setBlock rainbow">
      <div class="setHead"><span class="setName">Rainbow Dream</span><span class="setErr">You need to select the top first</span></div>
      <div class="tiles">
        <div class="tile" data-g="rtop"><img src="assets/cozy/tiles/rainbow-top.png" alt=""><span>Fuzzy Sweater</span></div>
        <div class="tile" data-g="rbot"><img src="assets/cozy/tiles/rainbow-bottom.png" alt=""><span>Ruffle Skirt</span></div>
      </div>
    </div>
    <div class="resetRow"><button class="chip" id="baseChip">Back to base outfit</button></div>
  </section>
</div>

<script>
const RENDER={
  ytop:'assets/cozy/yellow-top.png?v=2', ybot:'assets/cozy/yellow-bottom.png',
  ptop:'assets/cozy/pink-top.png', pbot:'assets/cozy/pink-bottom.png',
  rtop:'assets/cozy/rainbow-top.png', rbot:'assets/cozy/rainbow-bottom.png'
};
const BASE='assets/cozy/model.png';
const model=document.getElementById('model');
const tiles=[...document.querySelectorAll('.tile')];
const SVG_STAR='<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 0c1 8 4 11 12 12-8 1-11 4-12 12-1-8-4-11-12-12 8-1 11-4 12-12z" fill="#fff"/></svg>';
function sparkleBurst(n){
  n=n||16;
  const wrap=document.querySelector('.modelWrap');
  const layer=document.createElement('div'); layer.className='sparkleLayer';
  for(let i=0;i<n;i++){
    const s=document.createElement('div'); s.className='spark';
    s.style.left=(12+Math.random()*76)+'%';
    s.style.top=(6+Math.random()*84)+'%';
    s.style.setProperty('--sz',(8+Math.random()*20)+'px');
    s.style.animationDelay=(i*26+Math.random()*40)+'ms';
    s.innerHTML=SVG_STAR;
    layer.appendChild(s);
  }
  wrap.appendChild(layer);
  setTimeout(()=>layer.remove(),1000);
}
function swap(src,el){
  clearErrs();
  sparkleBurst();
  model.style.opacity=0;
  setTimeout(()=>{ model.src=src; },200);
  setTimeout(()=>{ model.style.opacity=1; },270);
  tiles.forEach(t=>t.classList.toggle('sel',t===el));
}
// each bottom belongs to a set (y/p/r); its top must be picked first
const selectedTops=new Set();
function clearErrs(){ document.querySelectorAll('.setBlock.err').forEach(b=>b.classList.remove('err')); }
function tileClick(t){
  const g=t.dataset.g, prefix=g[0], isTop=g.endsWith('top');
  if(isTop){ selectedTops.add(prefix); swap(RENDER[g],t); }
  else if(selectedTops.has(prefix)){ swap(RENDER[g],t); }
  else { clearErrs(); t.closest('.setBlock').classList.add('err'); }
}
tiles.forEach(t=>t.addEventListener('click',()=>tileClick(t)));
document.getElementById('baseChip').addEventListener('click',()=>{ selectedTops.clear(); swap(BASE,null); });

// music toggle (defaults on; Nathan wires the actual audio)
const musicBtn=document.getElementById('music');
const SPK_ON='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9h3l4.5-3.5v13L7 15H4z" fill="currentColor"/><path d="M15.5 9a4 4 0 0 1 0 6"/><path d="M18 6.5a8 8 0 0 1 0 11"/></svg>';
const SPK_OFF='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9h3l4.5-3.5v13L7 15H4z" fill="currentColor"/><path d="M15.5 9.5l5 5M20.5 9.5l-5 5"/></svg>';
let musicOn=true;
const bgm=new Audio('cozy-bgm.mp3');
bgm.loop=true; bgm.volume=0.45;
function renderMusic(){
  musicBtn.innerHTML=musicOn?SPK_ON:SPK_OFF;
  musicBtn.classList.toggle('muted',!musicOn);
  musicBtn.title=musicOn?'Music on \u2014 tap to mute':'Music muted \u2014 tap to play';
  musicBtn.setAttribute('aria-label',musicBtn.title);
  if(musicOn){ bgm.play().catch(()=>{}); } else { bgm.pause(); }
}
// Browsers block sound until the first gesture \u2014 start on the first tap anywhere.
function primeAudio(){ if(musicOn) bgm.play().catch(()=>{}); }
window.addEventListener('pointerdown',primeAudio,{once:true});
musicBtn.addEventListener('click',()=>{ musicOn=!musicOn; renderMusic(); });
renderMusic();

// hairstyles (cosmetic — no hair assets yet)
document.querySelectorAll('.hair').forEach(h=>h.addEventListener('click',()=>{
  document.querySelectorAll('.hair').forEach(x=>x.classList.remove('sel')); h.classList.add('sel');
}));

// stars — persisted so Ivy's hoard survives reloads. These are NOT redeemable
// (unlike the Planner's stars); they only ever go up.
const STAR_KEY='cozy_closet_stars';
const sc=document.getElementById('starCount');
let stars=parseInt(localStorage.getItem(STAR_KEY),10);
if(!Number.isFinite(stars)) stars=10000;   // Amy's preload gift — Ivy's "max" 😄
function setStars(n){ stars=n; sc.textContent=stars.toLocaleString(); localStorage.setItem(STAR_KEY,String(stars)); }
setStars(stars);
// ⭐ IVY'S STAR FARM — tapping Finish repeatedly keeps stacking stars. This is
// NOT a bug. The user found the hole, loves it, and begged us not to fix it.
// Leave it. Only revisit if Cozy Closet ever ships to public users. — Oscar
document.getElementById('finish').addEventListener('click',()=>{ setStars(stars+5); sparkleBurst(24); });

// photo -> My Looks tray (max 5)
const tray=document.getElementById('tray'); let looks=0;
document.getElementById('photo').addEventListener('click',()=>{
  if(looks>=5) return;
  looks++;
  const src=model.src;
  const sel=document.querySelector('.tile.sel');
  const g=sel?sel.dataset.g:'';
  const s=document.createElement('div'); s.className='slot'; s.title='Wear this look again';
  const im=document.createElement('img'); im.src=src; s.appendChild(im); tray.appendChild(s);
  s.addEventListener('click',()=>{
    const tile=g?document.querySelector('.tile[data-g="'+g+'"]'):null;
    swap(src,tile);
  });
});

// start over
document.getElementById('reset').addEventListener('click',()=>{
  selectedTops.clear(); swap(BASE,null); tray.innerHTML=''; looks=0; // keep stars — they persist now
  document.querySelectorAll('.hair').forEach((x,i)=>x.classList.toggle('sel',i===0));
});
</script>
</body>
</html>
